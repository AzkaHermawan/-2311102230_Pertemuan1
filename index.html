<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ramadan Kareem - Berbagi Kebahagiaan</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1e5128, #4e944f);
            color: white;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .card-ramadan {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: transform 0.3s ease;
        }
        .card-ramadan:hover {
            transform: translateY(-5px);
        }
        .btn-thr {
            background-color: #ffc107;
            border: none;
            color: #1e5128;
            font-weight: bold;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 1.2rem;
            box-shadow: 0 5px 15px rgba(255, 193, 7, 0.4);
        }
        .btn-thr:hover {
            background-color: #e0a800;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card-ramadan">
                    <h1 class="display-4 fw-bold mb-3">🌙 Selamat Ramadan</h1>
                    <p class="lead mb-4">Semoga keberkahan menyertai kita semua di bulan yang suci ini.</p>
                    <hr class="bg-white my-4">
                    <p>Klik tombol di bawah ini untuk kejutan kecil!</p>
                    <button class="btn btn-thr mt-3" onclick="ambilThr()">
                        🎁 Ambil THR Sekarang
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        function ambilThr() {
            Swal.fire({
                title: '🎉 Selamat!',
                text: 'Selamat anda mendapatkan THR sebesar Rp 1.000.000!',
                icon: 'success',
                confirmButtonText: 'Alhamdulillah',
                confirmButtonColor: '#1e5128',
            });
        }
    </script>
</body>
</html>
